{% extends "base.html" %}

{%block content %}
<div  class="w-4/12 border rounded-lg bg-white p-4 mx-auto border-zinc-300">
    <h1 class ='font-bold text-2xl'>Регистрация</h1>
    <p class="'text-sm text-zinc-500 font-medium" >Зарегистрируйтесь, чтобы создавать посты, комментировать и сохранять в избранное.</p>
    <form method="post" class="mt-4 flex flex-col gap-4">
        {% csrf_token %}
        {{ non_field_errors }}
        <div>
            <label for="username" class="block text-sm text-zinc-500">Имя пользователя</label>
            <input value="{{username_value}}" placeholder="Имя пользователя" id="username" name="username" type="text" class="w-full ps-4 py-2 border border-zinc-300 text-base rounded-lg"/>
        {{errors.username }}
        </div>
        <div>
            <label for="email" class="block text-sm text-zinc-500">Email</label>
            <input value="{{email_value}}" placeholder="Email" id="email" name="email" type="text" class="w-full ps-4 py-2 border border-zinc-300 text-base rounded-lg"/>
            {{errors.email}}
        </div>
        <div class="mt-4">
            <label for="password" class="block text-sm text-zinc-500">Пароль</label>
            <input placeholder="Пароль" id="password" name="password1" type="password" class="w-full ps-4 py-2 border border-zinc-300 text-base rounded-lg"/>
            {{errors.password2}}
        </div>
        <div class="mt-4">
            <label for="r_password" class="block text-sm text-zinc-500">Повторите пароль</label>
            <input placeholder="Повторите пароль" id="r_password" name="password2" type="password" class="w-full ps-4 py-2 border border-zinc-300 text-base rounded-lg"/>
        </div>
        <button type='submit' class="flex items-center justify-center h-11 px-6 bg-black text-white text-base font-medium rounded-lg">Создать аккаунт</button>
        <p class="mt-5 text-sm text-slate-600 text-center">Уже есть аккаунт? <a href="{% url 'login' %}" class="text-blue-600">Войти</a></p>

    </form>
</div>
{% endblock %}
