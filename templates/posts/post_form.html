{% extends "base.html" %}

{% block content %}
<h1 class="text-2xl font-bold">Новый пост</h1>

<form>
    <div>
        <label for="title" class="block text-sm text-zinc-500">Заголовок</label>
        <input id="title" name="title" type="text" class="w-full ps-4 py-2 border border-zinc-300 text-base rounded-lg"/>
    </div>
    <div>
        <label for="title" class="block text-sm text-zinc-500">Текст поста</label>
        <textarea id="title" name="title" class="w-full ps-4 py-2 border border-zinc-300 text-base rounded-lg min-h-20"></textarea>
    </div>
    <button type='submit' class="flex items-center justify-center h-11 px-6 bg-black text-white text-base font-medium rounded-lg">Создать</button>

</form>


{% endblock %}
