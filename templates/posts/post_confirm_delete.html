{% extends 'base.html' %}

{% block content %}

<div>
    <h1>Удалить пост</h1>
    <p>Вы действительно хотите удалить '{{object.title}}'?</p>

    <form method="post">
        {%csrf_token%}

        <button type="submit">Удалить</button>

        <a href="{{ object.get_absolute_url }}">Отмена</a>
    </form>
</div>
{%endblock%}
